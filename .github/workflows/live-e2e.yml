name: Live E2E

on:
  workflow_dispatch:
    inputs:
      runner_labels_json:
        description: 'JSON array for a Docker/kubectl/kind-capable runner'
        required: true
        default: '["self-hosted","linux"]'

permissions:
  contents: read

jobs:
  live-e2e:
    name: Local PaaS bootstrap smoke
    runs-on: ${{ fromJSON(inputs.runner_labels_json) }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - name: Verify live E2E tools
        run: |
          docker version
          kubectl version --client=true
          if ! command -v kind >/dev/null 2>&1 && ! command -v k3d >/dev/null 2>&1; then
            echo "Live E2E requires kind or k3d on this runner" >&2
            exit 1
          fi
      - run: pnpm install --frozen-lockfile
      - name: Run live E2E
        run: pnpm e2e:live
        env:
          RAIBITSERVER_EXECUTE: '1'
          REGISTRY_URL: localhost:5000
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: raibitserver-live-e2e-report
          path: |
            .raibitserver-work/e2e-report.json
            .raibitserver-work/live-e2e-report.json
          if-no-files-found: ignore
