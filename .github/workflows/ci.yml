name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  node:
    name: Node / Prisma / local E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm typecheck
      - run: node scripts/check-structure.js
      - run: pnpm prisma:validate
        env:
          DATABASE_URL: postgresql://raibitserver:raibitserver@localhost:5432/raibitserver
      - run: pnpm prisma:generate
        env:
          DATABASE_URL: postgresql://raibitserver:raibitserver@localhost:5432/raibitserver
      - run: |
          node -e "import('yaml').then(({default:YAML})=>{const fs=require('node:fs'); YAML.parse(fs.readFileSync('openapi/raibitserver.yaml','utf8')); console.log('openapi-ok')})"
      - run: node src/cli.js validate examples/project.json
      - run: node src/cli.js manifest examples/project.json >/tmp/raibitserver-manifest.json
      - run: node src/cli.js compose examples/docker-compose.yml >/tmp/raibitserver-compose-plan.json
      - run: node src/cli.js provision-plan examples/project.json >/tmp/raibitserver-provision-plan.json
      - run: node src/cli.js k8s-apply examples/project.json >/tmp/raibitserver-k8s-apply.json
      - run: pnpm dev:e2e

  go:
    name: Go services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
      - run: |
          for dir in services/builder services/orchestrator services/provisioner services/log-ingester services/metrics-ingester; do
            test -f "$dir/go.mod"
            (cd "$dir" && go test ./... && go build ./...)
          done

  manifests:
    name: OpenAPI and Helm smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node -e "import('yaml').then(({default:YAML})=>{const fs=require('node:fs'); YAML.parse(fs.readFileSync('openapi/raibitserver.yaml','utf8')); for (const f of ['infra/k8s/appservice-crd.yaml','infra/operators/manageddatabase-crd.yaml','infra/operators/managedresources-crd.yaml']) YAML.parse(fs.readFileSync(f,'utf8')); console.log('yaml-ok')})"
      - run: |
          if command -v helm >/dev/null 2>&1; then
            helm template raibitserver infra/helm/raibitserver >/tmp/raibitserver-helm.yaml
          else
            echo "helm not installed on runner image; YAML parse smoke completed"
          fi
