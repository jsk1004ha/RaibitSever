apiVersion: apps/v1
kind: Deployment
metadata:
  name: raibitserver-api
  labels:
    app.kubernetes.io/name: raibitserver-api
    app.kubernetes.io/managed-by: helm
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: raibitserver-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: raibitserver-api
    spec:
      automountServiceAccountToken: false
      containers:
        - name: api
          image: "{{ .Values.image.registry }}/raibitserver/api:{{ .Values.image.tag }}"
          ports:
            - containerPort: 3000
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
