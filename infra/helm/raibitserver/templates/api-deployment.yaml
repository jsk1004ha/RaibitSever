apiVersion: apps/v1
kind: Deployment
metadata:
  name: raibitserver-api
  labels:
    app.kubernetes.io/name: raibitserver-api
    app.kubernetes.io/managed-by: helm
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: raibitserver-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: raibitserver-api
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "{{ .Values.image.registry }}/raibitserver/api:{{ .Values.image.tag }}"
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            readOnlyRootFilesystem: true
            runAsUser: 10001
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
