services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: raibitserver
      POSTGRES_PASSWORD: raibitserver
      POSTGRES_DB: raibitserver
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: raibitserver
      MINIO_ROOT_PASSWORD: raibitserver-secret
    ports:
      - "9000:9000"
      - "9001:9001"
