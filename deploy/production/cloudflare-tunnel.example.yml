# Example locally-managed Cloudflare Tunnel config for RAIBITSERVER.
# Replace <TUNNEL_UUID>, credential path, and raibitserver.app before use.
# Run cloudflared inside the cluster or on a host that can reach the internal
# Kubernetes ingress controller service.
#
# Do not add per-service tunnel rules such as
# web--project--org.apps.raibitserver.app. Keep Cloudflare at zone-level
# wildcard routing and let Kubernetes Ingress route by Host.

tunnel: <TUNNEL_UUID>
credentials-file: /etc/cloudflared/<TUNNEL_UUID>.json

originRequest:
  connectTimeout: 30s
  noHappyEyeballs: true

ingress:
  # Platform API: keep JWT/RBAC/rate limits enabled in RAIBITSERVER.
  - hostname: api.raibitserver.app
    service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80

  # Dashboard/Admin: also protect this hostname with Cloudflare Access and keep
  # RAIBITSERVER_DASHBOARD_BASIC_AUTH enabled in the app.
  - hostname: admin.raibitserver.app
    service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
  - hostname: console.raibitserver.app
    service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80

  # Tenant workloads and preview apps. Kubernetes Ingress owns the final Host
  # match for web--project--org.apps and pr-N--web--project--org.preview.
  - hostname: "*.apps.raibitserver.app"
    service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
  - hostname: "*.preview.raibitserver.app"
    service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80

  # Management and resource consoles: protect both wildcard zones with
  # Cloudflare Access, then keep RAIBITSERVER RBAC inside the API.
  - hostname: "*.console.raibitserver.app"
    service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80
  - hostname: "*.resources.raibitserver.app"
    service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80

  # Never expose PostgreSQL/MySQL/Redis/registry ports here for general users.
  # Use RAIBITSERVER mediated consoles for DB UI and WARP/private network/SSH
  # bastion for operator-only TCP access.
  - service: http_status:404
